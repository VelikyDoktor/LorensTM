<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ИИ Ассистент</title>
</head>
<body>
    <h2>Спроси ИИ о питании или вводи сам</h2>
    
    <input type="text" id="userInput" placeholder="Например: сколько калорий в яблоке?">
    <button onclick="askAI()">Спросить</button>

    <p style="font-weight: bold; color: green;" id="response"></p>

    <script src="script.js"></script>
    <script>
        async function askAI() {
            const input = document.getElementById('userInput').value;
            const responseDiv = document.getElementById('response');
            
            responseDiv.innerText = "ИИ думает...";

            // Обращаемся к нашей серверной функции!
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: input })
            });

            const data = await res.json();
            
            // Выводим ответ на экран
            if (data.reply) {
                responseDiv.innerText = data.reply;
            } else {
                responseDiv.innerText = "Произошла ошибка.";
            }
        }
    </script>
    <div class="manual-entry" style="background: #f4f4f9; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
    <h3>Ручной ввод (на 100г)</h3>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <input type="number" id="manual-p" placeholder="Белки" style="width: 80px; padding: 5px;">
        <input type="number" id="manual-f" placeholder="Жиры" style="width: 80px; padding: 5px;">
        <input type="number" id="manual-c" placeholder="Угл." style="width: 80px; padding: 5px;">
        <input type="number" id="manual-weight" placeholder="Вес (г)" style="width: 80px; padding: 5px;">
        <button onclick="addManualEntry()" style="padding: 5px 15px; cursor: pointer;">Добавить</button>
    </div>
</div>
</body>
</html>
